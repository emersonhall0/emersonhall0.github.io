<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Graphics | Emerson Hall</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }

    /* ===== NAV MENU ===== */
    nav {
      background: #2f4f7f;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      padding: 15px 20px;
      display: block;
      font-weight: bold;
    }

    nav a:hover {
      background: #4a6fa5;
    }

    /* ===== HEADER ===== */
    header {
      background: #4a6fa5;
      color: white;
      text-align: center;
      padding: 30px;
    }
