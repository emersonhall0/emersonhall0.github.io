<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Graphics | Emerson Hall</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }

    /* ===== NAV MENU ===== */
    nav {
      background: #2f4f7f;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    nav li a,
    nav li span {
      display: block;
      padding: 15px 20px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav li a:hover {
      background: #4a6fa5;
    }

    /* Active page highlight */
    .active {
      color: #ffd700;
      cursor: default;
    }

    /* ===== HEADER ===== */
    header {
      background: #4a6fa5;
      color: white;
      padding: 30px;
      text-align: center;
    }

    /* ===== GALLERY ===== */
    .gallery {
      max-width: 800px;
      margin: 30px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 25px;
      padding: 20px;
    }

    .frame {
      background: white;
      border: 2px solid #ccc;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    }

    .frame img {
      width: 120px;
      height: auto;
      margin-bottom: 10px;
    }

    .frame p {
      margin: 0;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- ✅ WORKING NAV MENU -->
 
<nav>
  <ul>
    <li><span class="active">Home</span></li>
    <li><a href="pages/projects.html">Projects</a></li>
    <li><a href="pages/graphics.html">Graphics</a></li>
    <li><a href="pages/contact.html">Contact</a></li>
  </ul>
</nav>

  <!-- ✅ HEADER -->
  <header>
    <h1>Graphics</h1>
    <p>My visual design work</p>
  </header>

  <!-- ✅ IMAGE GALLERY -->
  <div class="gallery">

    <div class="frame">
      <img src="../images/Law.png" alt="Law Graphic">
      <p>Law Graphic</p>
    </div>

    <div class="frame">
      <img src="../images/Logo.png" alt="Logo Design">
      <p>Logo Design</p>
    </div>

    <div class="frame">
      <img src="../images/Mixed.png" alt="Mixed Media">
      <p>Mixed Media</p>
    </div>

  </div>

</body>
</html>
