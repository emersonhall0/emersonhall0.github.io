<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Graphics | Emerson Hall</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    /* ===== NAV ===== */
    nav {
      background: #2f4f7f;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    nav li a {
      display: block;
      padding: 15px 20px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav li a:hover {
      background: #4a6fa5;
    }

    /* ===== HEADER ===== */
    header {
      background: #4a6fa5;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    /* ===== GALLERY LAYOUT ===== */
    .gallery {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }

    .frame {
      background: white;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    }

    .frame img {
      width: 100%;
      max-width: 200px;
      height: auto;
      margin-bottom: 10px;
    }

    .frame p {
      margin: 0;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="graphics.html">Graphics</a></li>
    </ul>
  </nav>

  <!-- HEADER -->
  <header>
    <h1>Graphics</h1>
    <p>My visual design work</p>
  </header>

  <!-- GALLERY -->
  <div class="gallery">

    <div class="frame">
      <img src="images/Law.png" alt="Law Graphic">
      <p>Law Graphic</p>
    </div>

    <div class="frame">
      <img src="images/Logo.png" alt="Logo Design">
      <p>Logo Design</p>
    </div>

    <div class="frame">
      <img src="images/Mixed.png" alt="Mixed Media Graphic">
      <p>Mixed Logo</p>
    </div>

  </div>

</body>
</html>
